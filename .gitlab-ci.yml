stages:
  - validate
  - lint
  - format
  - flake8
  - pylint
  - pyupgrade
  - type-check
  - vulture
  - secret-scan
  - gitleaks
  - semgrep
  - audit
  - test
  - smoke

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_BREAK_SYSTEM_PACKAGES: "1"

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt

validate:
  stage: validate
  script:
    - python -m pip install pydantic
    - python scripts/ci/compile_python.py
    - python scripts/ci/forbid_cloud_clients.py
    - python scripts/ci/test_storage_contract.py

lint:
  stage: lint
  script:
    - python -m pip install ruff
    - python -m ruff check .

format:
  stage: format
  script:
    - python -m pip install ruff
    - python -m ruff format . --check

flake8:
  stage: flake8
  script:
    - python -m pip install flake8
    - python -m flake8 . --max-line-length=100 --exclude=my,__pycache__,.mypy_cache

pylint:
  stage: pylint
  script:
    - python -m pip install pylint pydantic
    - python -m pylint *.py scripts/ specs/ --disable=C,R --max-line-length=100 --ignore=my

pyupgrade:
  stage: pyupgrade
  script:
    - python -m pip install pyupgrade
    - python -m pyupgrade --py310-plus *.py scripts/ci/*.py specs/*.py

type-check:
  stage: type-check
  script:
    - python -m pip install mypy
    - python -m mypy . --no-error-summary

vulture:
  stage: vulture
  script:
    - python -m pip install vulture
    - python -m vulture . --min-confidence 80

secret-scan:
  stage: secret-scan
  script:
    - python -m pip install bandit
    - python -m bandit -r . -c .bandit

gitleaks:
  stage: gitleaks
  script:
    - curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks
    - gitleaks detect --source . --no-git -v

semgrep:
  stage: semgrep
  script:
    - python -m pip install semgrep
    - python -m semgrep --config=auto --error .

audit:
  stage: audit
  script:
    - python -m pip install pip-audit
    - python -m pip_audit --strict -r requirements.txt

test:
  stage: test
  script:
    - python -m pip install pytest pytest-cov
    - python -m pytest specs/ -v --cov=. --cov-report=xml:coverage.xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

ocr_smoke:
  stage: smoke
  needs: ["validate", "lint", "format", "flake8", "pylint", "pyupgrade", "type-check", "vulture", "secret-scan", "gitleaks", "semgrep", "audit", "test"]
  tags:
    - local-ocr
  before_script:
    - command -v tesseract &>/dev/null || (command -v apt-get &>/dev/null && sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr) || (command -v pacman &>/dev/null && sudo pacman -Sy --noconfirm tesseract)
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt
  script:
    - python test1.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

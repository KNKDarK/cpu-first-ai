stages:
  - validate
  - lint
  - type-check
  - secret-scan
  - audit
  - test
  - smoke

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_BREAK_SYSTEM_PACKAGES: "1"

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt

validate:
  stage: validate
  script:
    - python -m pip install pydantic
    - python scripts/ci/compile_python.py
    - python scripts/ci/forbid_cloud_clients.py
    - python scripts/ci/test_storage_contract.py

lint:
  stage: lint
  script:
    - python -m pip install ruff
    - bash scripts/ci/lint.sh

type-check:
  stage: type-check
  script:
    - python -m pip install mypy
    - bash scripts/ci/type_check.sh

secret-scan:
  stage: secret-scan
  script:
    - python -m pip install detect-secrets
    - bash scripts/ci/secret_scan.sh

audit:
  stage: audit
  script:
    - python -m pip install pip-audit
    - bash scripts/ci/audit.sh

test:
  stage: test
  script:
    - python -m pip install pytest pytest-cov
    - bash scripts/ci/run_tests.sh
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

ocr_smoke:
  stage: smoke
  needs: ["validate", "lint", "type-check", "secret-scan", "audit", "test"]
  tags:
    - local-ocr
  before_script:
    - command -v tesseract &>/dev/null || (command -v apt-get &>/dev/null && sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr) || (command -v pacman &>/dev/null && sudo pacman -Sy --noconfirm tesseract)
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install -r requirements.txt
  script:
    - python test1.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

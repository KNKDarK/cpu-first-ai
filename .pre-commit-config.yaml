repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        name: Lint
        args: [--fix]
        stages: [pre-commit, pre-push]
      - id: ruff-format
        name: Format
        stages: [pre-commit, pre-push]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: Type Check
        args: [--no-error-summary, --ignore-missing-imports]
        stages: [pre-push]
        additional_dependencies: [pydantic]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: Security
        args: [-r, ., -c, pyproject.toml]
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: python-compile
        name: Quality - Syntax Check
        entry: python scripts/ci/compile_python.py
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: forbid-cloud-clients
        name: Quality - No Cloud APIs
        entry: python scripts/ci/forbid_cloud_clients.py
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: storage-contract
        name: Quality - Storage Contract
        entry: python scripts/ci/test_storage_contract.py
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: test-with-coverage
        name: Quality - Tests with Coverage
        entry: python -m pytest specs/ -v --cov=. --cov-report=term
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: ocr-smoke
        name: Quality - OCR Smoke Test
        entry: python test1.py
        language: system
        pass_filenames: false
        stages: [pre-push]
